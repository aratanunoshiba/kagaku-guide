<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ニュースレター — 科学の学校ガイド</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .g-journal-hero {
      background: linear-gradient(135deg, #3a2a6e 0%, #7f77dd 100%);
      border-radius: 14px;
      padding: 28px 20px;
      margin-bottom: 12px;
      text-align: center;
      color: #fff;
    }
    .g-journal-icon-lg {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }
    .g-journal-hero-title {
      font-size: 18px;
      font-weight: 700;
      display: block;
      margin: 0 0 6px 0;
    }
    .g-journal-hero-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      display: block;
    }
    .g-journal-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #3a2a6e;
      color: #fff;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 10px;
    }
    .g-journal-btn:hover { opacity: 0.85; }
    .g-journal-btn svg { flex-shrink: 0; }
    .g-journal-label {
      font-size: 11px;
      color: #888;
      margin: 0 0 10px 0;
      display: block;
    }
  </style>
</head>
<body>

<div class="guide-wrap">

  <div class="g-sub-header">
    <a class="g-back-btn" href="index.html"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd"/></svg>もどる</a>
    <div class="g-sub-icon g-ic-purple">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7f77dd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    </div>
    <div class="g-sub-info">
      <span class="g-sub-num">⑩ NEWSLETTER</span>
      <span class="g-sub-title">ニュースレター</span>
    </div>
  </div>

  <div class="g-sub-body">

    <div class="g-journal-hero">
      <div class="g-journal-icon-lg">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="28" height="28"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      </div>
      <span class="g-journal-hero-title">科学の学校 ニュースレター</span>
      <span class="g-journal-hero-sub">授業の様子・お知らせ・読み物をお届けします</span>
    </div>

    <div class="g-sub-card">
      <p class="g-sub-text">科学の学校では、定期的にニュースレターを発行しています。</p>
      <p class="g-sub-text">授業の様子や実験のレポート、季節のトピックなど、さまざまな読み物をご用意しています。ぜひご覧ください。</p>
    </div>

    <div class="g-sub-card">
      <p class="g-journal-label">▼ バックナンバーはこちら</p>
      <a class="g-journal-btn" href="https://kagakunogakkou.ikuseisha.com/category/%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9%E3%83%AC%E3%82%BF%E3%83%BC/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        ニュースレターを読む
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14" style="margin-left:auto"><path fill-rule="evenodd" d="M4.25 5.5a.75.75 0 00-.75.75v8.5c0 .414.336.75.75.75h8.5a.75.75 0 00.75-.75v-4a.75.75 0 011.5 0v4A2.25 2.25 0 0112.75 17h-8.5A2.25 2.25 0 012 14.75v-8.5A2.25 2.25 0 014.25 4h5a.75.75 0 010 1.5h-5z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M6.194 12.753a.75.75 0 001.06.053L16.5 4.44v2.81a.75.75 0 001.5 0v-4.5a.75.75 0 00-.75-.75h-4.5a.75.75 0 000 1.5h2.553l-9.056 8.194a.75.75 0 00-.053 1.06z" clip-rule="evenodd"/></svg>
      </a>
    </div>

    <div class="g-sub-card">
      <p class="g-sub-text g-sub-closing">新しい号が発行されたらぜひチェックしてください。</p>
    </div>

  </div>

  <div class="g-bottom-back">
    <a class="g-bottom-btn" href="index.html"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd"/></svg>ガイドトップにもどる</a>
  </div>

</div>

</body>
</html>
