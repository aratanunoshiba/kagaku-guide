<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アイコンプレビュー</title>
<style>
  body { font-family: sans-serif; background: #f5f4ef; padding: 20px; }
  h1 { font-size: 14px; color: #666; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; max-width: 600px; }
  .item { background: #fff; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #eee; }
  .box { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
  .box svg { width: 28px; height: 28px; }
  .num { font-size: 10px; color: #bbb; margin-bottom: 2px; }
  .name { font-size: 11px; color: #333; font-weight: bold; }
</style>
</head>
<body>
<h1>アイコンプレビュー（実際より拡大表示）</h1>
<div class="grid">

  <div class="item">
    <div class="box" style="background:#e8ecf5">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3a5c99" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </div>
    <div class="num">① NEWCOMER</div>
    <div class="name">新入会の方向け</div>
  </div>

  <div class="item">
    <div class="box" style="background:#e4f5e0">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3d8830" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </div>
    <div class="num">② LINE</div>
    <div class="name">LINEの登録</div>
  </div>

  <div class="item">
    <div class="box" style="background:#e6f1fb">
      <svg viewBox="0 0 24 24" fill="none" stroke="#378add" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    </div>
    <div class="num">③ CALENDAR</div>
    <div class="name">年間カレンダー</div>
  </div>

  <div class="item">
    <div class="box" style="background:#e1f5ee">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1d9e75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
    </div>
    <div class="num">④ TRANSFER</div>
    <div class="name">振替について</div>
  </div>

  <div class="item">
    <div class="box" style="background:#fde8e8">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c44040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
    </div>
    <div class="num">⑤ CURRICULUM</div>
    <div class="name">カリキュラム</div>
  </div>

  <div class="item">
    <div class="box" style="background:#faeeda">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ba7517" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
    </div>
    <div class="num">⑥ EMAIL</div>
    <div class="name">メールシステム</div>
  </div>

  <div class="item">
    <div class="box" style="background:#e4eef5">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3d6d90" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5L9.5 10l5.5-4 4 4.5-6.5 3L9.5 10"/><line x1="9.5" y1="10" x2="18.5" y2="10"/></svg>
    </div>
    <div class="num">⑦ PARKING</div>
    <div class="name">各教室の駐輪場</div>
  </div>

  <div class="item">
    <div class="box" style="background:#faece7">
      <svg viewBox="0 0 24 24" fill="none" stroke="#d85a30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5l-2 4v1h2v13h14V8h2V7l-2-4h-4"/><path d="M9 3a3 3 0 006 0"/><line x1="12" y1="8" x2="12" y2="21"/></svg>
    </div>
    <div class="num">⑧ LAB COAT</div>
    <div class="name">白衣の注文</div>
  </div>

  <div class="item">
    <div class="box" style="background:#eeedfe">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7f77dd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    </div>
    <div class="num">⑨ JOURNAL</div>
    <div class="name">育星（機関誌）</div>
  </div>

  <div class="item">
    <div class="box" style="background:#eaf3de">
      <svg viewBox="0 0 24 24" fill="none" stroke="#639922" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5v4l7 9 7-9V3h-4"/><line x1="9" y1="3" x2="15" y2="3"/></svg>
    </div>
    <div class="num">⑩ EXPERIMENT</div>
    <div class="name">特別実験</div>
  </div>

  <div class="item">
    <div class="box" style="background:#f5ede0">
      <svg viewBox="0 0 24 24" fill="none" stroke="#8c5a30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="num">⑪ QUIZ</div>
    <div class="name">学期末クイズ</div>
  </div>

</div>
</body>
</html>
